<section class="product-list">
  <header class="page-header">
    <h1>NatWest personal current accounts</h1>
    <p>Products returned from the backend function.</p>
  </header>

  <div class="status-panel">
    <div @if="isLoading()">Loading products…</div>
    <div @if="error()">Error: {{ error() }}</div>
    <div @if="emptyState()">No products are available yet.</div>
  </div>

  <div @if="hasProducts()">
    <table class="product-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Provider ID</th>
        </tr>
      </thead>
      <tbody @for="let product of products()">
        <tr>
          <td>{{ product.name }}</td>
          <td>{{ product.providerId }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <button class="refresh-button" type="button" (click)="loadProducts()">Refresh products</button>
</section>
